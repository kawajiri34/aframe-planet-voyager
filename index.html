<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planet Voyager - 太陽系 VR</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>
    <script src="https://unpkg.com/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #000" vr-mode-ui="enabled: true">
      <a-light type="ambient" color="#222"></a-light>
      <a-light type="point" intensity="1.5" distance="200" decay="1" position="0 0 0"></a-light>

      <a-entity
        id="camera-rig"
        position="0 2 30"
      >
        <a-entity
          camera
          look-controls="pointerLockEnabled: true"
          wasd-controls="acceleration: 100"
          position="0 1.6 0"
          cursor="rayOrigin: mouse"
          raycaster="objects: .clickable"
        >
          <a-text
            id="info-text"
            value=""
            position="0 -0.4 -1"
            align="center"
            color="#fff"
            width="3"
          ></a-text>
        </a-entity>
      </a-entity>

      <a-entity id="solar-system"></a-entity>
    </a-scene>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
